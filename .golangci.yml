version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    # staticcheck (honnef.co/go/tools v0.7.0) panics on Go 1.27 promoted-field
    # struct literal syntax. Re-enable once staticcheck supports Go 1.27 stable.
    # - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - noctx
    - prealloc
    - revive
  settings:
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          disabled: true
        - name: var-naming
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
          - noctx
      - path: sqldb/
        linters:
          - unused
          - unparam
      - path: web/node_modules/
        linters:
          - govet
          - errcheck
          - unused
          - staticcheck
