# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv: [".env"]

env:
  GO111MODULE: auto

vars:
  VERSION: 0.1.0
  MAIN_PATH: ./cmd/server/main.go
  BINARY_NAME: ./tmp/main.exe
  # Goose Variables
  GOOSE_DIR: ./sqldb/migrate
  GOOSE_DRIVER: sqlite3

tasks:
  default:
    desc: Show all available commands
    cmds:
      - task --list
    silent: true

  # Development
  setup:
    desc: One-time dev setup (Swarm, Traefik, ...etc)
    cmd: go run ./cmd/setup/main.go

  teardown:
    desc: Revert dev setup (remove Traefik, ...etc)
    cmd: go run ./cmd/setup/main.go --teardown

  dev:
    desc: Start development server with live reload (Air)
    preconditions:
      - sh: command -v air
        msg: "Air not found. Install with: go install github.com/air-verse/air@latest"
    cmd: air

  start:
    env:
      GO_ENV: prod
    desc: Run the production binary (requires build first)
    cmd: "{{.BINARY_NAME}}"

  build:
    desc: Build optimized binary for current OS
    cmds:
      - task: web:build
      - task: mod:tidy
      - task: mod:clean
      - go build -ldflags="-w -s -X goploy/src/conf.VERSION={{.VERSION}}" -trimpath -o {{.BINARY_NAME}} {{.MAIN_PATH}}
      - ls -lh {{.BINARY_NAME}}

  # Code Quality
  code:test:
    desc: Run all tests with gotestsum external formatter
    preconditions:
      - sh: command -v gotestsum
        msg: "gotestsum not found. Install with: go install gotest.tools/gotestsum@latest"
    vars:
      DB_PATH: ./tmp/test.db
    env:
      GO_ENV: test
      ENV_PATH: ../.env
      DB_PATH: ".{{.DB_PATH}}"
    cmds:
      - mkdir -p tmp
      - task: migrate:up
        vars:
          DB_PATH: "{{.DB_PATH}}"
      - gotestsum --format testname ./tests/...
      - rm -rf tmp

  code:lint:
    desc: Lint Go source code with golangci-lint
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint not found. Install with: brew install golangci-lint"
    cmd: golangci-lint run ./...

  code:format:
    desc: Format all Go source code with gofumpt (stricter gofmt)
    preconditions:
      - sh: command -v gofumpt
        msg: "gofumpt not found. Install with: go install mvdan.cc/gofumpt@latest"
      - sh: command -v golines
        msg: "goline not found. Install with: go install github.com/golangci/golines@latest"
    cmds:
      - go fmt ./...
      - gofumpt -l -w .
      - golines -m 80 -w .

  # Dependencies
  mod:deps:
    desc: Download and cache all dependencies
    cmd: go mod download

  mod:tidy:
    desc: Remove unused dependencies and clean go.mod
    cmd: go mod tidy

  mod:clean:
    desc: Remove build artifacts and temporary files
    cmd: rm -rf bin/ tmp/ coverage.out coverage.html

  # Atlas Schema Management
  atlas:diff:
    desc: "Generate Goose migration file (usage: task atlas:diff NAME=add_users)"
    preconditions:
      - sh: command -v atlas
        msg: "Atlas not found. Install: https://atlasgo.io/getting-started#step-1-install-atlas"
      - sh: '[ -n "{{.NAME}}" ]'
        msg: "NAME is required. Usage: task atlas:diff NAME=add_users"
    cmds:
      - atlas migrate diff {{.NAME}} --env local --config file://sqldb/atlas.hcl
      - go run ./sqldb/tools/script.go
      - atlas migrate hash --env local --config file://sqldb/atlas.hcl

  # Migrations (goose)
  migrate:up:
    desc: Run all pending migrations
    preconditions:
      - sh: command -v goose
        msg: "goose not found. Install with: go install github.com/pressly/goose/v3/cmd/goose@latest"
    cmd: GOOSE_DRIVER={{.GOOSE_DRIVER}} GOOSE_DBSTRING="{{.DB_PATH}}" goose -dir {{.GOOSE_DIR}} up

  migrate:down:
    desc: Rollback last migration
    cmd: GOOSE_DRIVER={{.GOOSE_DRIVER}} GOOSE_DBSTRING="{{.DB_PATH}}" goose -dir {{.GOOSE_DIR}} down

  migrate:status:
    desc: Show migration status
    cmd: GOOSE_DRIVER={{.GOOSE_DRIVER}} GOOSE_DBSTRING="{{.DB_PATH}}" goose -dir {{.GOOSE_DIR}} status

  migrate:reset:
    desc: Rollback all migrations
    cmd: GOOSE_DRIVER={{.GOOSE_DRIVER}} GOOSE_DBSTRING="{{.DB_PATH}}" goose -dir {{.GOOSE_DIR}} reset

  # Code Generation (sqlc)
  sqlc:
    desc: Generate type-safe Go code from SQL queries
    preconditions:
      - sh: command -v sqlc
        msg: "sqlc not found. Install with: go install github.com/sqlc-dev/sqlc/src/sqlc@latest"
    dir: sqldb
    cmd: sqlc generate

  # Web Dashboard (React Router + Bun)
  web:dev:
    desc: Start web dashboard dev server
    dir: web
    cmd: bun run dev

  web:build:
    desc: Build web dashboard for production
    dir: web
    cmd: bun run build

  web:deps:
    desc: Install web dashboard dependencies
    dir: web
    cmd: bun install

  web:lint:
    desc: Lint web dashboard code with ESLint
    dir: web
    cmd: bun run lint

  web:format:
    desc: Format web dashboard code with Prettier
    dir: web
    cmd: bun run format

  web:check:
    desc: Run lint and format checks
    dir: web
    cmd: bun run check
