version: "2"
sql:
  - engine: "sqlite"
    queries: "./queries/*.sql"
    schema: "./schema/*.sql"
    gen:
      go:
        package: "repos"
        out: "../src/db/repos"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
